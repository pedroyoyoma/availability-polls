<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Availability Results</title>
<style>
  :root{--navy:#1a2744;--navy2:#243358;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--indigo:#6366f1}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef2ff;color:#1e2a40;min-height:100vh}

  header{background:var(--navy);color:white;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header h1{font-size:1.2rem;font-weight:800}
  .select-wrap{position:relative;flex:1;min-width:180px;max-width:280px}
  .select-wrap select{width:100%;appearance:none;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);border-radius:10px;color:white;font-size:.9rem;font-weight:600;padding:8px 36px 8px 14px;cursor:pointer;outline:none}
  .select-wrap select:focus{border-color:rgba(255,255,255,.6)}
  .select-wrap select option{background:#1a2744;color:white}
  .select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.6);pointer-events:none}
  .header-actions{display:flex;gap:8px;margin-left:auto;align-items:center;flex-wrap:wrap}
  .hbtn{background:rgba(255,255,255,.12);border:none;color:white;padding:7px 14px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap}
  .hbtn:hover{background:rgba(255,255,255,.22)}
  .view-toggle{display:flex;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.2)}
  .view-btn{background:none;border:none;color:rgba(255,255,255,.65);padding:6px 13px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s}
  .view-btn.active{background:rgba(255,255,255,.22);color:white}

  /* Toolbar */
  .toolbar{background:var(--navy2);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .toolbar label{color:#94a3c0;font-size:.8rem;font-weight:600}
  #threshold{accent-color:var(--amber);width:100px}
  #threshold-val{color:white;font-weight:700;font-size:.85rem;min-width:20px}

  /* Member filter */
  .filter-bar{background:#1e3060;border-bottom:1px solid rgba(255,255,255,.08);padding:10px 20px;display:none;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .filter-bar.visible{display:flex}
  .filter-label{color:#94a3c0;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding-top:3px;white-space:nowrap}
  .filter-chips{display:flex;flex-wrap:wrap;gap:6px;flex:1}
  .member-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 10px 4px 8px;cursor:pointer;transition:all .15s;user-select:none}
  .member-chip.on{background:var(--indigo);border-color:var(--indigo)}
  .member-chip .chip-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35)}
  .member-chip.on .chip-dot{background:rgba(255,255,255,.9)}
  .member-chip span{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.7)}
  .member-chip.on span{color:white}
  .filter-actions{display:flex;gap:6px}
  .fbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.65);padding:4px 10px;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer}
  .fbtn:hover{background:rgba(255,255,255,.15);color:white}

  .status{padding:8px 20px;font-size:.8rem;color:#7080a0;background:#f8fafc;border-bottom:1px solid #e5e9f5}

  /* Manage panel */
  .manage-panel{display:none;background:#fff;border-bottom:2px solid #e5e9f5;padding:16px 20px}
  .manage-panel.open{display:block}
  .manage-panel h2{font-size:.85rem;font-weight:800;color:var(--navy);margin-bottom:12px}
  .poll-list{display:flex;flex-wrap:wrap;gap:8px}
  .poll-chip{display:flex;align-items:center;gap:6px;background:#eef2ff;border:2px solid #dde4f2;border-radius:20px;padding:5px 10px 5px 14px;font-size:.8rem;font-weight:700;color:#1e2a40}
  .poll-chip .del-btn{background:#fee2e2;border:none;color:var(--red);border-radius:50%;width:20px;height:20px;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0}
  .poll-chip .del-btn:hover{background:var(--red);color:white}
  .manage-note{font-size:.75rem;color:#94a3b8;margin-top:10px}

  /* Confirm overlay */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
  .overlay.open{display:flex}
  .confirm-box{background:white;border-radius:14px;padding:24px;max-width:340px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .confirm-box h3{font-size:1rem;margin-bottom:8px;color:var(--navy)}
  .confirm-box p{font-size:.85rem;color:#6080a0;margin-bottom:20px}
  .confirm-btns{display:flex;gap:10px;justify-content:center}
  .confirm-btns button{padding:9px 22px;border-radius:9px;border:none;font-weight:700;font-size:.85rem;cursor:pointer}
  .btn-cancel{background:#eef2ff;color:#1e2a40}
  .btn-delete{background:var(--red);color:white}

  /* Grid view */
  .container{padding:16px 14px;max-width:1400px;margin:0 auto}
  .summary-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:18px}
  .sum-card{background:white;border-radius:10px;padding:14px 16px;border:2px solid #e5e9f5;text-align:center}
  .sum-card .num{font-size:2rem;font-weight:900;line-height:1}
  .sum-card .lbl{font-size:.7rem;color:#7080a0;margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .sum-card.highlight{border-color:var(--green)}
  .sum-card.highlight .num{color:var(--green)}
  .best-banner{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;border-radius:12px;padding:16px 18px;margin-bottom:18px}
  .best-banner h2{font-size:.85rem;font-weight:800;margin-bottom:10px;opacity:.75}
  .best-dates{display:flex;flex-wrap:wrap;gap:8px}
  .best-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);border-radius:20px;padding:5px 12px;font-size:.78rem;font-weight:700;line-height:1.3;white-space:nowrap}
  .best-chip.perfect{background:var(--green);border-color:var(--green)}
  .best-chip .chip-slot{opacity:.75;font-weight:600;font-size:.72rem}
  .best-chip .chip-count{opacity:.65;font-size:.7rem}
  .month-section{margin-bottom:20px}
  .month-title{font-size:.82rem;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;padding:5px 0 7px;border-bottom:2px solid var(--navy);margin-bottom:10px}
  .dates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:8px}
  .date-card{border-radius:10px;border:2px solid #dde4f2;background:white;overflow:hidden}
  .date-card.full{border-color:var(--green);box-shadow:0 0 0 2px rgba(34,197,94,.18)}
  .date-card.partial{border-color:var(--amber)}
  .card-top{padding:8px 10px 5px;display:flex;justify-content:space-between;align-items:flex-start}
  .card-label{font-size:.82rem;font-weight:900;color:#1e2a40}
  .card-count{font-size:.67rem;font-weight:800;padding:2px 7px;border-radius:10px;white-space:nowrap}
  .card-count.all{background:#dcfce7;color:#14532d}
  .card-count.most{background:#fef9c3;color:#854d0e}
  .card-count.some{background:#fee2e2;color:#991b1b}
  .card-count.zero{background:#f1f5f9;color:#94a3b8}
  .member-dots{padding:3px 10px 8px;display:flex;flex-wrap:wrap;gap:4px}
  .mdot{font-size:.63rem;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;cursor:default;position:relative}
  .mdot.avail{background:var(--green);color:white}
  .mdot.unavail{background:#e5e9f5;color:#94a3b8}
  .mdot .mslot{font-size:.58rem;font-weight:700;opacity:.85;margin-left:2px}
  /* Tooltip */
  .mdot[title]:hover::after{content:attr(title);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#1e2a40;color:white;font-size:.7rem;padding:3px 8px;border-radius:6px;white-space:nowrap;z-index:10;pointer-events:none}

  /* Calendar view */
  .cal-container{padding:16px 14px;max-width:1100px;margin:0 auto;display:none}
  .cal-container.active{display:block}
  .cal-month{margin-bottom:28px}
  .cal-month-title{font-size:.9rem;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;padding:6px 0 10px;border-bottom:2px solid var(--navy);margin-bottom:10px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-dow{text-align:center;font-size:.68rem;font-weight:800;color:#94a3b8;text-transform:uppercase;padding-bottom:5px;letter-spacing:.04em}
  .cal-day{border-radius:8px;min-height:62px;padding:5px 6px;border:1.5px solid transparent;background:#f1f5f9;position:relative;cursor:default}
  .cal-day.empty{background:transparent;border-color:transparent}
  .cal-day.in-poll{background:white;border-color:#dde4f2;cursor:pointer;transition:transform .1s,box-shadow .1s}
  .cal-day.in-poll:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
  .cal-day.cal-full{background:#dcfce7;border-color:var(--green)}
  .cal-day.cal-partial{background:#fef9c3;border-color:var(--amber)}
  .cal-day.cal-low{background:#fee2e2;border-color:#fca5a5}
  .cal-day.cal-none{background:#f1f5f9;border-color:#e2e8f0}
  .cal-day.cal-filtered-out{opacity:.3}
  .cal-day-num{font-size:.78rem;font-weight:800;color:#1e2a40;margin-bottom:3px}
  .cal-day.cal-full .cal-day-num{color:#14532d}
  .cal-day.cal-partial .cal-day-num{color:#854d0e}
  .cal-count{font-size:.62rem;font-weight:700;color:#6080a0}
  .cal-day.cal-full .cal-count{color:#166534}
  .cal-day.cal-partial .cal-count{color:#92400e}
  .cal-day.cal-low .cal-count{color:#991b1b}
  .cal-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
  .cal-mdot{font-size:.55rem;font-weight:700;padding:1px 4px;border-radius:4px}
  .cal-mdot.avail{background:var(--green);color:white}
  .cal-mdot.unavail{background:#e5e9f5;color:#94a3b8}

  .empty{text-align:center;padding:60px 20px;color:#94a3b8}
  .empty h2{font-size:1.1rem;margin-bottom:8px}
  .spinner{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <h1>Availability Results</h1>
  <div class="select-wrap">
    <select id="proj-select" onchange="onSelectChange()">
      <option value="">Loading polls…</option>
    </select>
  </div>
  <div class="header-actions">
    <div class="view-toggle" id="view-toggle" style="display:none">
      <button class="view-btn active" id="btn-grid" onclick="setView('grid')">⊞ Grid</button>
      <button class="view-btn" id="btn-cal" onclick="setView('calendar')">📅 Calendar</button>
    </div>
    <button class="hbtn" onclick="loadProjects()" title="Refresh">↺ Refresh</button>
    <button class="hbtn" id="manage-btn" onclick="toggleManage()" style="display:none">Manage</button>
  </div>
</header>

<div class="manage-panel" id="manage-panel">
  <h2>Remove a poll</h2>
  <div class="poll-list" id="poll-list"></div>
  <p class="manage-note">Removing a poll deletes its response tab from the Google Sheet permanently.</p>
</div>

<div class="toolbar" id="toolbar" style="display:none">
  <label>Show dates where at least</label>
  <input type="range" id="threshold" min="1" max="10" value="4" step="1" oninput="onThreshold()">
  <span id="threshold-val">4</span>
  <label>members available</label>
</div>

<div class="filter-bar" id="filter-bar">
  <span class="filter-label">Filter by member:</span>
  <div class="filter-chips" id="filter-chips"></div>
  <div class="filter-actions">
    <button class="fbtn" onclick="selectAllMembers()">All</button>
    <button class="fbtn" onclick="clearAllMembers()">None</button>
  </div>
</div>

<div class="status" id="status">Loading polls…</div>

<div class="container" id="container">
  <div class="empty"><h2>Select a poll above to see results.</h2></div>
</div>

<div class="cal-container" id="cal-container"></div>

<div class="overlay" id="overlay">
  <div class="confirm-box">
    <h3>Delete poll?</h3>
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-delete" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxyVThgmyd0byozws-o8QsLnAjNT9ENOUzAsraRPOOiwG1Je11594NpUgFIj7fnVJxS/exec';

let allProjects    = [];
let currentProject = null;
let currentData    = null;
let threshold      = 4;
let pendingDelete  = null;
let selectedMembers = new Set();
let abbrevMap      = {};
let viewMode       = 'grid';

// ── Smart abbreviation builder ──────────────────────────────────────
function buildAbbrevMap(names) {
  const map = {};
  names.forEach(name => {
    for (let len = 1; len <= name.length; len++) {
      const abbrev = name.substring(0, len);
      const conflict = names.some(n => n !== name && n.substring(0, len).toLowerCase() === abbrev.toLowerCase());
      if (!conflict) { map[name] = abbrev; break; }
    }
    if (!map[name]) map[name] = name.substring(0, 2);
  });
  return map;
}

// ── Parsing helpers ─────────────────────────────────────────────────
function parseLabel(h) {
  if (/^\d{1,2}\/\d{1,2}\/\d{2}$/.test(h)) return h;
  if (h.includes('T')) {
    const d = new Date(h);
    if (!isNaN(d)) return `${d.getUTCMonth()+1}/${d.getUTCDate()}/${String(d.getUTCFullYear()).slice(2)}`;
  }
  const months = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  const parts = h.split(' ');
  if (parts.length >= 3 && months[parts[1]]) return `${months[parts[1]]}/${parts[2]}/26`;
  return h;
}

function getMonth(label) {
  const norm = parseLabel(label);
  const parts = norm.split('/');
  if (parts.length === 3) {
    const mNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return mNames[parseInt(parts[0]) - 1] || 'Unknown';
  }
  return label.split(' ')[1] || 'Unknown';
}

function topSlot(label, dateMap, members) {
  const counts = {};
  members.forEach(m => {
    const val = dateMap[label][m];
    if (!val) return;
    val.split('+').forEach(s => { counts[s] = (counts[s]||0) + 1; });
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  return sorted.length ? sorted[0][0] : '';
}

function isAvail(val) { return val && val !== ''; }

function abbrevSlot(s) {
  if (!s) return '';
  const map = {'All Day':'All','Evening':'Eve','Midday':'Mid','AM':'AM'};
  return s.split(', ').map(p => map[p.trim()] || p.trim()).join('+');
}

// ── Filtering helpers ────────────────────────────────────────────────
// Returns true if the date passes the current member filter.
// No selection = show everything. Selecting names = ALL must be available.
function passesFilter(dateMapEntry) {
  if (selectedMembers.size === 0) return true; // no filter active = show all
  for (const m of selectedMembers) {
    if (!isAvail(dateMapEntry[m])) return false;
  }
  return true;
}

function allMembersSelected(members) {
  return members.every(m => selectedMembers.has(m));
}

// ── Member filter UI ─────────────────────────────────────────────────
function buildFilterBar(members) {
  const bar  = document.getElementById('filter-bar');
  const chips = document.getElementById('filter-chips');
  bar.classList.add('visible');
  chips.innerHTML = members.map(m => `
    <div class="member-chip" id="chip-${m}" onclick="toggleMember('${m}')">
      <div class="chip-dot"></div>
      <span>${m}</span>
    </div>`).join('');
}

function toggleMember(name) {
  if (selectedMembers.has(name)) {
    selectedMembers.delete(name);
    document.getElementById('chip-'+name)?.classList.remove('on');
  } else {
    selectedMembers.add(name);
    document.getElementById('chip-'+name)?.classList.add('on');
  }
  if (currentData) rerender();
}

function selectAllMembers() {
  if (!currentData) return;
  currentData.rows.forEach(r => { selectedMembers.add(r.member); document.getElementById('chip-'+r.member)?.classList.add('on'); });
  rerender();
}

function clearAllMembers() {
  selectedMembers.clear();
  document.querySelectorAll('.member-chip').forEach(c => c.classList.remove('on'));
  rerender();
}

// ── View toggle ──────────────────────────────────────────────────────
function setView(mode) {
  viewMode = mode;
  document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
  document.getElementById('btn-cal').classList.toggle('active', mode === 'calendar');
  document.getElementById('container').style.display    = mode === 'grid'     ? '' : 'none';
  document.getElementById('cal-container').style.display = mode === 'calendar' ? '' : 'none';
  if (currentData) rerender();
}

function rerender() {
  if (!currentData) return;
  render(currentData);
}

// ── Load / project management ────────────────────────────────────────
window.addEventListener('DOMContentLoaded', loadProjects);

async function loadProjects() {
  const sel = document.getElementById('proj-select');
  sel.innerHTML = '<option value="">Loading…</option>';
  document.getElementById('status').textContent = 'Fetching poll list…';
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=list`);
    const json = await res.json();
    if (json.status === 'error') throw new Error(json.message);
    allProjects = json.projects || [];
    sel.innerHTML = '<option value="">— select a poll —</option>' +
      allProjects.map(p => `<option value="${p}"${p===currentProject?' selected':''}>${p}</option>`).join('');
    document.getElementById('manage-btn').style.display = allProjects.length ? '' : 'none';
    rebuildManageList();
    if (currentProject && allProjects.includes(currentProject)) {
      document.getElementById('status').textContent = 'Poll list refreshed.';
    } else {
      currentProject = null;
      document.getElementById('toolbar').style.display = 'none';
      document.getElementById('view-toggle').style.display = 'none';
      document.getElementById('filter-bar').classList.remove('visible');
      document.getElementById('container').innerHTML = '<div class="empty"><h2>Select a poll above to see results.</h2></div>';
      document.getElementById('cal-container').innerHTML = '';
      document.getElementById('status').textContent = `${allProjects.length} poll${allProjects.length!==1?'s':''} available.`;
    }
  } catch (err) {
    sel.innerHTML = '<option value="">Error loading</option>';
    document.getElementById('status').textContent = 'Could not load poll list — check Apps Script is v5.';
  }
}

function onSelectChange() {
  const val = document.getElementById('proj-select').value;
  if (!val) return;
  currentProject = val;
  loadData();
}

function toggleManage() {
  const panel = document.getElementById('manage-panel');
  const btn   = document.getElementById('manage-btn');
  const open  = panel.classList.toggle('open');
  btn.textContent = open ? 'Done' : 'Manage';
}

function rebuildManageList() {
  document.getElementById('poll-list').innerHTML = allProjects.map(p =>
    `<div class="poll-chip">${p}<button class="del-btn" onclick="askDelete('${p.replace(/'/g,"\\'")}')">✕</button></div>`
  ).join('') || '<span style="color:#94a3b8;font-size:.82rem">No polls yet.</span>';
}

function askDelete(name) {
  pendingDelete = name;
  document.getElementById('confirm-msg').textContent = `"${name}" and all its responses will be permanently deleted. This cannot be undone.`;
  document.getElementById('overlay').classList.add('open');
}
function closeConfirm() { pendingDelete = null; document.getElementById('overlay').classList.remove('open'); }
async function confirmDelete() {
  if (!pendingDelete) return;
  const name = pendingDelete; closeConfirm();
  document.getElementById('status').textContent = `Deleting "${name}"…`;
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=delete&project=${encodeURIComponent(name)}`);
    const json = await res.json();
    if (json.status === 'error') throw new Error(json.message);
    if (currentProject === name) {
      currentProject = null;
      document.getElementById('container').innerHTML = '<div class="empty"><h2>Poll deleted.</h2></div>';
      document.getElementById('cal-container').innerHTML = '';
      document.getElementById('toolbar').style.display = 'none';
      document.getElementById('view-toggle').style.display = 'none';
    }
    await loadProjects();
    document.getElementById('status').textContent = `"${name}" deleted.`;
  } catch (err) {
    document.getElementById('status').textContent = 'Delete failed: ' + err.message;
  }
}

async function loadData() {
  if (!currentProject) return;
  document.getElementById('status').innerHTML = '<span class="spinner"></span>Loading…';
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=results&project=${encodeURIComponent(currentProject)}`);
    const json = await res.json();
    if (json.status === 'error') throw new Error(json.message);
    currentData = json;
    const members = json.rows.map(r => r.member);

    // Init abbreviations; start with no filter active (show everything)
    abbrevMap = buildAbbrevMap(members);
    selectedMembers = new Set();
    buildFilterBar(members);

    if (members.length > 0) {
      threshold = Math.max(1, members.length - 1);
      const sl = document.getElementById('threshold');
      sl.max   = members.length;
      sl.value = threshold;
      document.getElementById('threshold-val').textContent = threshold;
    }

    document.getElementById('toolbar').style.display = '';
    document.getElementById('view-toggle').style.display = '';
    render(json);
  } catch (err) {
    document.getElementById('status').textContent = 'Failed to load: ' + err.message;
  }
}

function onThreshold() {
  threshold = +document.getElementById('threshold').value;
  document.getElementById('threshold-val').textContent = threshold;
  if (currentData) rerender();
}

// ── Main render ──────────────────────────────────────────────────────
function render(data) {
  const members = data.rows.map(r => r.member);
  const headers = data.headers;

  if (!members.length || !headers.length) {
    document.getElementById('status').textContent = `${currentProject} — no submissions yet.`;
    document.getElementById('container').innerHTML =
      '<div class="empty"><h2>No responses yet.</h2><p>Share the poll so people can submit.</p></div>';
    document.getElementById('cal-container').innerHTML = '';
    return;
  }

  const dateMap = {};
  headers.forEach(h => { dateMap[h] = {}; });
  data.rows.forEach(row => {
    headers.forEach(h => { dateMap[h][row.member] = row.availability[h] || ''; });
  });

  // Build date counts
  const dateCounts = headers.map(h => ({
    raw:     h,
    label:   parseLabel(h),
    count:   members.filter(m => isAvail(dateMap[h][m])).length,
    members: members.map(m => ({ name: m, avail: isAvail(dateMap[h][m]), slot: dateMap[h][m] || '' }))
  }));

  // Apply member filter + threshold — dates that pass both
  const filteredDates = dateCounts.filter(d => {
    const meetsThreshold = d.count >= threshold;
    const passesMemFilter = passesFilter(dateMap[d.raw]);
    return meetsThreshold && passesMemFilter;
  });

  const perfect  = dateCounts.filter(d => d.count === members.length);
  const filterActive = selectedMembers.size > 0;

  document.getElementById('status').textContent =
    `${currentProject} · ${members.length} response${members.length!==1?'s':''} · ` +
    `${filteredDates.length} date${filteredDates.length!==1?'s':''} shown (≥${threshold} available` +
    (filterActive ? `, must include: ${[...selectedMembers].join(', ')}` : '') +
    `) · ${perfect.length} with everyone free`;

  if (viewMode === 'grid') {
    renderGrid(data, dateCounts, dateMap, members, filteredDates, perfect);
  } else {
    renderCalendar(data, dateCounts, dateMap, members, filteredDates);
  }
}

// ── Grid render ──────────────────────────────────────────────────────
function renderGrid(data, dateCounts, dateMap, members, filteredDates, perfect) {
  const filteredSet = new Set(filteredDates.map(d => d.raw));

  const summaryHTML = `<div class="summary-row">
    <div class="sum-card"><div class="num">${members.length}</div><div class="lbl">Responses</div></div>
    <div class="sum-card highlight"><div class="num">${perfect.length}</div><div class="lbl">Everyone free</div></div>
    <div class="sum-card"><div class="num">${filteredDates.length}</div><div class="lbl">Dates shown</div></div>
    <div class="sum-card"><div class="num">${data.headers.length}</div><div class="lbl">Total dates</div></div>
  </div>`;

  const sorted = [...filteredDates].sort((a,b) => b.count - a.count);
  const top = sorted.filter(d => d.count > 0).slice(0, 10);
  const bestChips = top.map(d => {
    const slot = topSlot(d.raw, dateMap, members);
    const slotLabel = slot ? ` <span class="chip-slot">· ${slot}</span>` : '';
    const countLabel = ` <span class="chip-count">${d.count}/${members.length}</span>`;
    return `<span class="best-chip${d.count===members.length?' perfect':''}">${d.label}${slotLabel}${countLabel}</span>`;
  }).join('');
  const bannerHTML = `<div class="best-banner">
    <h2>🏆 Best dates</h2>
    <div class="best-dates">${top.length ? bestChips : '<span style="opacity:.5;font-size:.8rem">No dates match current filter</span>'}</div>
  </div>`;

  // Only show months that have at least one visible date
  const visibleMonths = [...new Set(filteredDates.map(d => getMonth(d.raw)))];
  const monthsHTML = visibleMonths.length ? visibleMonths.map(month => {
    const cards = filteredDates.filter(d => getMonth(d.raw) === month).map(d => {
      const pct = d.count / members.length;
      const cardClass = pct === 1 ? 'full' : pct >= 0.5 ? 'partial' : '';
      const ccls = pct === 1 ? 'all' : d.count >= threshold ? 'most' : d.count > 0 ? 'some' : 'zero';
      const dotsHTML = d.members.map(m => {
        const abbrev = abbrevMap[m.name] || m.name.charAt(0);
        const slotAbbrev = m.avail && m.slot ? `<span class="mslot">${abbrevSlot(m.slot)}</span>` : '';
        const tooltip = m.avail ? `${m.name} — ${m.slot}` : m.name;
        return `<span class="mdot ${m.avail?'avail':'unavail'}" title="${tooltip}">${abbrev}${slotAbbrev}</span>`;
      }).join('');
      return `<div class="date-card ${cardClass}">
        <div class="card-top">
          <div class="card-label">${d.label}</div>
          <span class="card-count ${ccls}">${d.count===0?'none':d.count+'/'+members.length}</span>
        </div>
        <div class="member-dots">${dotsHTML}</div>
      </div>`;
    }).join('');
    return `<div class="month-section"><div class="month-title">${month}</div><div class="dates-grid">${cards}</div></div>`;
  }).join('') : '<div class="empty"><h2>No dates match the current filter.</h2><p>Try lowering the threshold or adjusting the member filter.</p></div>';

  document.getElementById('container').innerHTML = summaryHTML + bannerHTML + monthsHTML;
}

// ── Calendar render ──────────────────────────────────────────────────
function renderCalendar(data, dateCounts, dateMap, members, filteredDates) {
  const filteredSet = new Set(filteredDates.map(d => d.raw));
  // Build a lookup from ISO date string to dateCount entry
  const isoLookup = {};
  dateCounts.forEach(d => {
    // raw header may be "Sat Jul 4" etc — parse to ISO
    const iso = rawToIso(d.raw);
    if (iso) isoLookup[iso] = d;
  });

  // Determine month range
  const isos = Object.keys(isoLookup).sort();
  if (!isos.length) { document.getElementById('cal-container').innerHTML = '<div class="empty"><h2>No dates to display.</h2></div>'; return; }

  const firstDate = new Date(isos[0] + 'T12:00:00');
  const lastDate  = new Date(isos[isos.length-1] + 'T12:00:00');

  let html = '';
  let cur = new Date(firstDate.getFullYear(), firstDate.getMonth(), 1);
  const end = new Date(lastDate.getFullYear(), lastDate.getMonth()+1, 1);
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dowNames   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  while (cur < end) {
    const y = cur.getFullYear(), mo = cur.getMonth();
    const monthLabel = `${monthNames[mo]} ${y}`;
    const firstDow = cur.getDay();
    const daysInMonth = new Date(y, mo+1, 0).getDate();

    html += `<div class="cal-month"><div class="cal-month-title">${monthLabel}</div><div class="cal-grid">`;
    // Day-of-week headers
    dowNames.forEach(d => { html += `<div class="cal-dow">${d}</div>`; });
    // Empty cells before first day
    for (let i = 0; i < firstDow; i++) html += `<div class="cal-day empty"></div>`;
    // Day cells
    for (let day = 1; day <= daysInMonth; day++) {
      const iso = `${y}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dc = isoLookup[iso];
      if (!dc) {
        html += `<div class="cal-day"><div class="cal-day-num" style="color:#c0cce0">${day}</div></div>`;
      } else {
        const inFiltered = filteredSet.has(dc.raw);
        const pct = dc.count / members.length;
        let colorClass = 'cal-none';
        if (dc.count === members.length) colorClass = 'cal-full';
        else if (dc.count >= threshold)  colorClass = 'cal-partial';
        else if (dc.count > 0)           colorClass = 'cal-low';
        const filteredOut = !inFiltered ? 'cal-filtered-out' : '';
        const dotsHTML = dc.members.map(m => {
          const abbrev = abbrevMap[m.name] || m.name.charAt(0);
          return `<span class="cal-mdot ${m.avail?'avail':'unavail'}">${abbrev}</span>`;
        }).join('');
        html += `<div class="cal-day in-poll ${colorClass} ${filteredOut}" title="${dc.label}: ${dc.count}/${members.length} available">
          <div class="cal-day-num">${day}</div>
          <div class="cal-count">${dc.count}/${members.length}</div>
          <div class="cal-dots">${dotsHTML}</div>
        </div>`;
      }
    }
    html += `</div></div>`;
    cur = new Date(y, mo+1, 1);
  }

  // Legend
  html += `<div style="display:flex;gap:12px;flex-wrap:wrap;padding:4px 0 16px;font-size:.75rem;font-weight:600;color:#6080a0">
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:3px;background:#dcfce7;border:1.5px solid #22c55e;display:inline-block"></span>Everyone free</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:3px;background:#fef9c3;border:1.5px solid #f59e0b;display:inline-block"></span>Meets threshold</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:3px;background:#fee2e2;border:1.5px solid #fca5a5;display:inline-block"></span>Below threshold</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:3px;background:#f1f5f9;border:1.5px solid #e2e8f0;display:inline-block"></span>No responses</span>
    <span style="display:flex;align-items:center;gap:5px;opacity:.45">Faded = filtered out by member/threshold</span>
  </div>`;

  document.getElementById('cal-container').innerHTML = html;
}

// Convert a raw header (various formats) to ISO string
function rawToIso(raw) {
  // Already ISO
  if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  // "Sat Jul 4" or "Tue Aug 18" style
  const months = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  const parts = raw.split(' ');
  if (parts.length >= 3 && months[parts[1]]) {
    const m = String(months[parts[1]]).padStart(2,'0');
    const d = String(parts[2]).padStart(2,'0');
    return `2026-${m}-${d}`;
  }
  // "m/d/yy" style
  const slashMatch = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
  if (slashMatch) {
    const m = String(slashMatch[1]).padStart(2,'0');
    const d = String(slashMatch[2]).padStart(2,'0');
    const y = '20' + slashMatch[3];
    return `${y}-${m}-${d}`;
  }
  return null;
}
